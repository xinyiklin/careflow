<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script>
      // Apply the stored theme before first paint so an explicit light/dark
      // choice doesn't flash the OS theme. Mirrors ThemeProvider: only
      // "light"/"dark" set the attribute; "system" (or unset) leaves it off
      // so CSS falls back to prefers-color-scheme.
      (function () {
        try {
          var t = localStorage.getItem("careflow_patient_theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CareFlow Patient Portal</title>

    <meta
      name="description"
      content="Patient-facing portal for CareFlow. Read-only view of profile, appointments, medications, and allergies."
    />

    <meta name="theme-color" content="#0F172A" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
