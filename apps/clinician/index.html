<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script>
      // Apply the best-known theme before first paint to avoid a flash. The
      // authoritative theme is server-side user preferences (fetched after
      // auth), so it can't be read here; the app mirrors the current preference
      // to `cf-theme-hint` (see ThemeProvider) and we replay it. Unset or
      // "system" follows the OS. Dark tokens are gated on the `.dark` class.
      (function () {
        try {
          var pref = localStorage.getItem("cf-theme-hint");
          var dark =
            pref === "dark" ||
            ((pref === "system" || !pref) &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CareFlow</title>

    <meta
      name="description"
      content="Full-stack clinic scheduling system built with React and Django. Supports appointment management, patient search, and role-based workflows."
    />

    <meta name="theme-color" content="#0F172A" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
