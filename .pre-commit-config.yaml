repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        files: ^backend/.*\.py$

  - repo: local
    hooks:
      - id: clinician-prettier
        name: clinician-prettier
        entry: bash -c 'cd apps/clinician && npx prettier --write "${@/#apps\/clinician\//}"' --
        language: system
        files: ^apps/clinician/.*\.(js|jsx|ts|tsx|json|css|md|html)$
        pass_filenames: true

      - id: clinician-eslint
        name: clinician-eslint
        entry: bash -c 'cd apps/clinician && npx eslint --fix "${@/#apps\/clinician\//}"' --
        language: system
        files: ^apps/clinician/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true

      - id: patient-prettier
        name: patient-prettier
        entry: bash -c 'cd apps/patient && npx prettier --write "${@/#apps\/patient\//}"' --
        language: system
        files: ^apps/patient/.*\.(js|jsx|ts|tsx|json|css|md|html)$
        pass_filenames: true

      - id: patient-eslint
        name: patient-eslint
        entry: bash -c 'cd apps/patient && npx eslint --fix "${@/#apps\/patient\//}"' --
        language: system
        files: ^apps/patient/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true
