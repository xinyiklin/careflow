  /v1/appointments/slot-hold/:
    post:
      operationId: appointments_slot_hold_create
      description: Acquire/override (POST) or heartbeat (PATCH) the soft 'being booked'
        presence hold on an empty slot.
      parameters:
      - in: query
        name: override
        schema:
          type: boolean
        description: Take over another scheduler's hold on the slot.
      - in: query
        name: resource
        schema:
          type: integer
        description: Resource (schedule column) id; omit for resource-agnostic slots.
      - in: query
        name: start_time
        schema:
          type: string
          format: date-time
        description: Facility-local slot start, e.g. 2026-04-22T09:00.
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
