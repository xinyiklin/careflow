components:
  schemas:
    ActionEnum:
      enum:
      - create
      - update
      - delete
      - view
      - export
      - login
      - other
      type: string
      description: |-
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `view` - View
        * `export` - Export
        * `login` - Login
        * `other` - Other
    Address:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        line_1:
          type: string
          maxLength: 255
        line_2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 100
        state:
          $ref: '#/components/schemas/StateEnum'
        zip_code:
          type: string
          maxLength: 10
      required:
      - city
      - id
      - line_1
      - state
      - zip_code
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        patient_id:
          type: integer
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        patient_first_name:
          type: string
          readOnly: true
        patient_middle_name:
          type: string
          readOnly: true
        patient_last_name:
          type: string
          readOnly: true
        patient_preferred_name:
          type: string
          readOnly: true
        patient_date_of_birth:
          type: string
          format: date
          readOnly: true
        patient_chart_number:
          type: string
          readOnly: true
        resource:
          type: integer
          nullable: true
        resource_name:
          type: string
          readOnly: true
        rendering_provider:
          type: integer
          nullable: true
        rendering_provider_name:
          type: string
          readOnly: true
        rendering_provider_role_name:
          type: string
          readOnly: true
        rendering_provider_title_name:
          type: string
          readOnly: true
        appointment_time:
          type: string
          format: date-time
        end_time:
          type: string
          nullable: true
        duration_minutes:
          type: string
          readOnly: true
        room:
          type: string
          maxLength: 50
        reason:
          type: string
        notes:
          type: string
        status:
          type: integer
        status_name:
          type: string
          readOnly: true
        status_code:
          type: string
          readOnly: true
        status_color:
          type: string
          readOnly: true
        appointment_type:
          type: integer
        appointment_type_name:
          type: string
          readOnly: true
        appointment_type_code:
          type: string
          readOnly: true
        appointment_type_color:
          type: string
          readOnly: true
        facility:
          type: integer
        created_by:
          type: integer
          readOnly: true
          nullable: true
        created_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_billable:
          type: boolean
        allow_same_day_double_book:
          type: boolean
          writeOnly: true
          default: false
      required:
      - appointment_time
      - appointment_type
      - appointment_type_code
      - appointment_type_color
      - appointment_type_name
      - created_at
      - created_by
      - created_by_name
      - duration_minutes
