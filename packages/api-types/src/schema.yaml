    Vitals:
      type: object
      description: |-
        Reject unknown and read-only fields on write requests.

        Fail-fast guard for catching misnamed payload keys instead of silently
        dropping them. Composed with ``ModelSerializer`` ahead of the base class.
      properties:
        id:
          type: integer
          readOnly: true
        encounter:
