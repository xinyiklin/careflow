          description: ''
  /v1/portal/refill-requests/:
    get:
      operationId: portal_refill_requests_list
      description: |-
        List or create refill requests for the authenticated patient.

        GET returns the patient's own requests from the last 90 days,
        ordered by ``-requested_at``. POST validates the medication belongs
        to the patient, is active, has no pending request open, and (if
        supplied) that the pharmacy is reachable by the patient's facility.
      summary: Patient portal refill requests (last 90 days)
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalRefillRequest'
          description: ''
    post:
      operationId: portal_refill_requests_create
      description: |-
        List or create refill requests for the authenticated patient.

        GET returns the patient's own requests from the last 90 days,
        ordered by ``-requested_at``. POST validates the medication belongs
        to the patient, is active, has no pending request open, and (if
        supplied) that the pharmacy is reachable by the patient's facility.
      summary: Patient portal refill requests (last 90 days)
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalRefillRequestCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalRefillRequestCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalRefillRequestCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalRefillRequest'
          description: ''
  /v1/portal/refill-requests/{id}/cancel/:
    post:
      operationId: portal_refill_requests_cancel_create
      description: |-
        Cancel a still-pending refill request owned by the patient.

        Returns 404 when the request is not owned by the patient, 400 when
        the request is already resolved (approved / denied / cancelled).
        Cancellation is patient-initiated, so ``resolved_at`` and
        ``resolved_by`` remain untouched — those track clinician resolution.
      summary: Cancel a pending refill request
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalRefillRequest'
          description: ''
  /v1/portal/scheduling/appointment-types/:
