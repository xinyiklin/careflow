  /v1/portal/me/preferred-pharmacy/:
    patch:
      operationId: portal_me_preferred_pharmacy_partial_update
      description: |-
        Update or clear the requesting patient's preferred pharmacy.

        Setting a value upserts a :class:`PatientPharmacy` row marked default
        + active for the patient; the model's ``save`` syncs
        :attr:`Patient.preferred_pharmacy` as a side effect so the two
        representations never diverge.

        Clearing (``pharmacy_id=null``) demotes any existing default
        :class:`PatientPharmacy` rows and clears
        :attr:`Patient.preferred_pharmacy` directly.
      summary: Update authenticated patient's preferred pharmacy
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPortalPreferredPharmacyUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPortalPreferredPharmacyUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPortalPreferredPharmacyUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalPreferredPharmacyUpdate'
          description: ''
  /v1/portal/medical-summary/:
    get:
      operationId: portal_medical_summary_retrieve
      description: |-
        Return the patient's signed visits with vitals + active meds + allergies.

        Drafts and in-progress encounters are intentionally hidden: patients see
        only finalized (signed) clinical records, matching the existing
        sign-off / lock contract.
      summary: Authenticated patient's medical summary
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalMedicalSummary'
          description: ''
  /v1/portal/medications/:
    get:
      operationId: portal_medications_list
      description: |-
        List the authenticated patient's medications.

        Active medications surface first; remaining records (inactive or
        discontinued) follow. Within each group results are ordered by
        ``created_at`` descending so the most recently entered medications
        appear at the top of their group.
      summary: Patient portal medications
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalMedication'
          description: ''
  /v1/portal/messaging/threads/:
    get:
      operationId: portal_messaging_threads_list
      description: |-
        List or start the authenticated patient's message threads.

        GET returns the patient's own threads ordered by ``-last_message_at``.
        POST creates a new thread plus the first patient message inside one
        transaction; the response shape mirrors the detail endpoint.
      summary: Patient portal message threads
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalMessageThreadList'
          description: ''
    post:
      operationId: portal_messaging_threads_create
      description: |-
        List or start the authenticated patient's message threads.

        GET returns the patient's own threads ordered by ``-last_message_at``.
        POST creates a new thread plus the first patient message inside one
        transaction; the response shape mirrors the detail endpoint.
      summary: Patient portal message threads
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalMessageThreadCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalMessageThreadCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalMessageThreadCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalMessageThreadDetail'
          description: ''
  /v1/portal/messaging/threads/{id}/:
    get:
      operationId: portal_messaging_threads_retrieve
      description: |-
        Return the full thread + messages for the requesting patient.

        Side effect: if the thread was unread for the patient, this view
        flips ``unread_for_patient`` to ``False`` (using ``update_fields`` so
        no other thread state is touched). 404 if the thread belongs to a
        different patient — we keep the not-yours surface identical to the
        doesn't-exist surface.
      summary: Patient portal message thread detail
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalMessageThreadDetail'
          description: ''
  /v1/portal/messaging/threads/{id}/reply/:
    post:
      operationId: portal_messaging_threads_reply_create
      description: |-
        Append a patient reply to an open thread.

        * 404 if the thread isn't owned by the requesting patient.
        * 400 if the thread is closed — patients cannot reopen closed
          threads from the portal (clinician-only action per product).
        * 400 if the body is empty or exceeds 4000 characters.

        On success the model's ``Message.save`` flips
        ``unread_for_clinician=True`` and bumps ``last_message_at``.
      summary: Reply to a patient portal message thread
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalMessageReply'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalMessageReply'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalMessageReply'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalMessage'
          description: ''
  /v1/portal/pharmacies/:
    get:
      operationId: portal_pharmacies_list
      description: |-
        Facility-scoped, active pharmacy directory for the patient.

        Filters through :func:`get_effective_pharmacy_ids` so org-level and
        facility-level preferences (including overrides and hides) are
        honoured before the patient ever sees the directory.
