              $ref: '#/components/schemas/PatchedCareProvider'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCareProvider'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareProvider'
          description: ''
    delete:
      operationId: patients_providers_destroy
      description: |-
        Resolve a Staff profile (and its facility) for the current request.

        Picks the requested facility via the ``facility_id`` query parameter when
        present; otherwise falls back to the user's default staff profile.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - patients
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /v1/portal/allergies/:
    get:
      operationId: portal_allergies_list
      description: |-
        List the authenticated patient's allergies.

        Active allergies first, then non-active, ordered within each group
        by severity (most dangerous first), with allergen as a tiebreaker.
      summary: Patient portal allergies
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalAllergy'
          description: ''
  /v1/portal/appointments/:
    get:
      operationId: portal_appointments_list
      description: |-
        List the authenticated patient's appointments.

        Default: upcoming appointments ordered by ``appointment_time`` ascending.
        With ``?past=true``: past appointments within the last 12 months,
        ordered by ``appointment_time`` descending.
      summary: Patient portal appointments
      parameters:
      - in: query
        name: past
        schema:
          type: string
        description: When 'true', return appointments from the previous 12 months
          ordered descending instead of upcoming appointments.
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortalAppointment'
          description: ''
  /v1/portal/appointments/{id}/cancel/:
    post:
      operationId: portal_appointments_cancel_create
      summary: Cancel a patient-booked appointment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalAppointmentBookingResponse'
          description: ''
  /v1/portal/auth/login/:
    post:
      operationId: portal_auth_login_create
      description: |-
        Username/password login for the patient portal.

        Issues a portal-surface token and writes the refresh cookie at the
        portal path, so the portal stops borrowing the clinician token
        endpoint (which set the clinic cookie path and a clinic-surface token).
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalTokenObtainPair'
          description: ''
  /v1/portal/auth/logout/:
    post:
      operationId: portal_auth_logout_create
      description: Revoke and clear the portal-scoped refresh cookie.
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /v1/portal/auth/refresh/:
    post:
      operationId: portal_auth_refresh_create
      description: |-
        Refresh a portal session token using the portal-path refresh cookie.

        Mirrors :class:`users.views.CookieTokenRefreshView` but reads and writes
        the cookie at :data:`users.views.PORTAL_REFRESH_COOKIE_PATH` so the
        browser keeps clinic and portal sessions isolated even on a shared host.
        The serializer also rejects a refresh token minted for the clinician
        surface, so a clinic token can't be replayed here to mint portal access.
      tags:
      - portal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalTokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalTokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalTokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalTokenRefresh'
          description: ''
  /v1/portal/demo-login/:
    post:
      operationId: portal_demo_login_create
      description: |-
        Issue a JWT for the seeded demo patient account.

        Only enabled when ``DEMO_MODE=true``; returns 403 otherwise. The demo
        user must already exist (created by ``seed_demo``) and must have an
        active :class:`PatientPortalAccount`. Refresh cookie matches the path
        used by the standard token-refresh flow.
      summary: Sign in as the seeded demo patient
      tags:
      - portal
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '403':
          description: No response body
        '500':
          description: No response body
  /v1/portal/me/:
    get:
      operationId: portal_me_retrieve
