          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
          nullable: true
        spo2_percent:
          type: integer
          maximum: 100
          minimum: 50
          nullable: true
        pain_score:
          type: integer
          maximum: 10
          minimum: 0
          nullable: true
        measured_at:
