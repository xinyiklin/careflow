name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clinician:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm -w @careflow/clinician run lint

      - name: Type check
        run: npm -w @careflow/clinician run typecheck

      - name: Build
        run: npm -w @careflow/clinician run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: careflow
          POSTGRES_USER: careflow_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U careflow_user -d careflow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Mirrors the local dev environment; bump alongside the venv when upgrading.
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django checks
        env:
          DATABASE_URL: postgres://careflow_user:password@localhost:5432/careflow
          DB_NAME: careflow
          DB_USER: careflow_user
          DB_PASSWORD: password
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: "ci-secret-key"
          DEBUG: "True"
        run: python manage.py check

      - name: Run Django tests
        env:
          DATABASE_URL: postgres://careflow_user:password@localhost:5432/careflow
          DB_NAME: careflow
          DB_USER: careflow_user
          DB_PASSWORD: password
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: "ci-secret-key"
          DEBUG: "True"
        run: python manage.py test --verbosity 2
